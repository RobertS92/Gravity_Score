# Railway config for the Gravity NIL Intelligence API service.
# In Railway → this service → Settings:
#   - Root Directory: .  (repo root — required for gravity_composite / gravity_ml / config)
#   - Build: Dockerfile at gravity_api/Dockerfile (below)
# No startCommand override needed — the Dockerfile CMD expands ${PORT} via sh -c.

[build]
builder = "DOCKERFILE"
dockerfilePath = "gravity_api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
