# Railway config for the Gravity NIL Intelligence API service.
# In Railway → this service → Settings:
#   - Root Directory: gravity_api
#   - Build: Railway auto-detects the Dockerfile in this folder.
# No startCommand override needed — the Dockerfile CMD expands ${PORT} via sh -c.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
