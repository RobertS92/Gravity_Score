# Railway config for the Gravity NIL Intelligence API service.
#
# Required service settings (Railway dashboard → Settings):
#   Root Directory = gravity_api
#   Builder = Dockerfile  (not Nixpacks/Railpack — sibling packages are not pip-installable)
#   Dockerfile path = Dockerfile
#
# docker-bundle/ vendors gravity_composite, gravity_ml, config for this build context.
# After changing those packages at repo root, run: bash scripts/sync_api_docker_bundle.sh

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
