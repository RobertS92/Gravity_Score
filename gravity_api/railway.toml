# Railway config for the Gravity NIL Intelligence API service.
# Settings → Root Directory: gravity_api  (this folder)
# Build uses Dockerfile here + docker-bundle/ for gravity_composite, gravity_ml, config.
# After changing sibling packages, run: bash scripts/sync_api_docker_bundle.sh

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
