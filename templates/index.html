<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Gravity - Modular Content Pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <header class="py-3 mb-4 border-bottom">
            <div class="d-flex align-items-center">
                <i class="fas fa-football-ball text-primary me-3 fs-2"></i>
                <h1 class="mb-0">NFL Gravity</h1>
                <span class="badge bg-secondary ms-3">Modular Content Pipeline</span>
            </div>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cogs me-2"></i>Pipeline Control</h5>
                    </div>
                    <div class="card-body">
                        <form id="scrapeForm">
                            <div class="mb-3">
                                <label for="teamSelect" class="form-label">Select Teams</label>
                                <select class="form-select" id="teamSelect" multiple size="8">
                                    <!-- Teams loaded dynamically -->
                                </select>
                                <div class="form-text">Hold Ctrl/Cmd to select multiple teams</div>
                            </div>
                            
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="fastMode">
                                    <label class="form-check-label" for="fastMode">
                                        Fast Mode (Skip heavy LLM calls)
                                    </label>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="scrapeBtn">
                                    <i class="fas fa-play me-2"></i>Start Scraping
                                </button>
                                <button type="button" class="btn btn-outline-secondary" id="selectAllBtn">
                                    Select All Teams
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle me-2"></i>Pipeline Status</h5>
                    </div>
                    <div class="card-body">
                        <div id="statusContent">
                            <p class="text-muted">Ready to start scraping...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-terminal me-2"></i>Live Logs</h5>
                        <button class="btn btn-sm btn-outline-secondary" id="refreshLogsBtn">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="logsContainer" class="logs-container">
                            <p class="text-muted">Logs will appear here during scraping...</p>
                        </div>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h5><i class="fas fa-database me-2"></i>Latest Data</h5>
                    </div>
                    <div class="card-body">
                        <div id="dataInfo">
                            <p class="text-muted">No data scraped yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-5 py-4 border-top text-center text-muted">
            <p>&copy; 2025 NFL Gravity - Modular Content Pipeline for NFL Data Analysis</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class NFLGravityApp {
            constructor() {
                this.init();
            }

            async init() {
                this.setupEventListeners();
                await this.loadTeams();
                this.refreshStatus();
                this.refreshDataInfo();
            }

            setupEventListeners() {
                document.getElementById('scrapeForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.startScraping();
                });

                document.getElementById('selectAllBtn').addEventListener('click', () => {
                    this.selectAllTeams();
                });

                document.getElementById('refreshLogsBtn').addEventListener('click', () => {
                    this.refreshLogs();
                });

                // Auto-refresh status every 5 seconds during scraping
                setInterval(() => {
                    this.refreshStatus();
                }, 5000);
            }

            async loadTeams() {
                try {
                    const response = await fetch('/api/teams');
                    const data = await response.json();
                    const select = document.getElementById('teamSelect');
                    
                    data.teams.forEach(team => {
                        const option = document.createElement('option');
                        option.value = team;
                        option.textContent = team.charAt(0).toUpperCase() + team.slice(1);
                        select.appendChild(option);
                    });
                } catch (error) {
                    console.error('Error loading teams:', error);
                }
            }

            selectAllTeams() {
                const select = document.getElementById('teamSelect');
                for (let option of select.options) {
                    option.selected = true;
                }
            }

            async startScraping() {
                const select = document.getElementById('teamSelect');
                const selectedTeams = Array.from(select.selectedOptions).map(option => option.value);
                const fastMode = document.getElementById('fastMode').checked;
                const scrapeBtn = document.getElementById('scrapeBtn');

                if (selectedTeams.length === 0) {
                    alert('Please select at least one team.');
                    return;
                }

                scrapeBtn.disabled = true;
                scrapeBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Scraping...';

                try {
                    const response = await fetch('/api/scrape', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            teams: selectedTeams,
                            fast: fastMode
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        this.showAlert('success', result.message);
                        this.refreshLogs();
                        this.refreshDataInfo();
                    } else {
                        this.showAlert('danger', `Error: ${result.error}`);
                    }
                } catch (error) {
                    this.showAlert('danger', `Network error: ${error.message}`);
                } finally {
                    scrapeBtn.disabled = false;
                    scrapeBtn.innerHTML = '<i class="fas fa-play me-2"></i>Start Scraping';
                }
            }

            async refreshStatus() {
                try {
                    const response = await fetch('/api/status');
                    const status = await response.json();
                    
                    const statusContent = document.getElementById('statusContent');
                    statusContent.innerHTML = `
                        <div class="status-item">
                            <strong>State:</strong> ${status.state || 'Ready'}
                        </div>
                        <div class="status-item">
                            <strong>Last Run:</strong> ${status.last_run || 'Never'}
                        </div>
                        <div class="status-item">
                            <strong>Total Runs:</strong> ${status.total_runs || 0}
                        </div>
                    `;
                } catch (error) {
                    console.error('Error refreshing status:', error);
                }
            }

            async refreshLogs() {
                try {
                    const response = await fetch('/api/logs');
                    const data = await response.json();
                    
                    const logsContainer = document.getElementById('logsContainer');
                    if (data.logs && data.logs.length > 0) {
                        logsContainer.innerHTML = data.logs.map(log => 
                            `<div class="log-line">${this.escapeHtml(log.trim())}</div>`
                        ).join('');
                        logsContainer.scrollTop = logsContainer.scrollHeight;
                    }
                } catch (error) {
                    console.error('Error refreshing logs:', error);
                }
            }

            async refreshDataInfo() {
                try {
                    const response = await fetch('/api/data/latest');
                    const data = await response.json();
                    
                    const dataInfo = document.getElementById('dataInfo');
                    if (data.files && data.files.length > 0) {
                        dataInfo.innerHTML = `
                            <div class="mb-2">
                                <strong>Latest Run:</strong> ${data.timestamp || 'Unknown'}
                            </div>
                            <div class="mb-2">
                                <strong>Files Generated:</strong>
                                <ul class="list-unstyled ms-3">
                                    ${data.files.map(file => `<li><i class="fas fa-file me-1"></i>${file}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <strong>Total Records:</strong> ${data.total_records || 'Unknown'}
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Error refreshing data info:', error);
                }
            }

            showAlert(type, message) {
                const alertHtml = `
                    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                
                const container = document.querySelector('.container-fluid');
                const header = container.querySelector('header');
                header.insertAdjacentHTML('afterend', alertHtml);
                
                // Auto-dismiss after 5 seconds
                setTimeout(() => {
                    const alert = container.querySelector('.alert');
                    if (alert) {
                        alert.remove();
                    }
                }, 5000);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new NFLGravityApp();
        });
    </script>
</body>
</html>
