<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gravity NIL Terminal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gn-bg:#0b0f14; --gn-panel:#121821; --gn-accent:#6ea8fe; --gn-text:#e6edf3; }
        body { background: var(--gn-bg); color: var(--gn-text); min-height: 100vh; }
        .navbar { background: var(--gn-panel) !important; border-bottom: 1px solid #202938; }
        .navbar-brand { color: var(--gn-accent) !important; font-weight: 700; letter-spacing: .08em; }
        .nav-link { color: #94a3b8 !important; }
        .nav-link.active, .nav-link:hover { color: var(--gn-accent) !important; }
        .content-wrapper { padding: 1.5rem 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">GRAVITY</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gnNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="gnNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/view-data"><i class="fas fa-terminal me-1"></i>Data terminal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/player-search"><i class="fas fa-search me-1"></i>Search athletes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/my-players"><i class="fas fa-user-tie me-1"></i>My roster (agents)</a>
                    </li>
                </ul>
                <span class="navbar-text small text-secondary">CFB · MCBB · NIL</span>
            </div>
        </div>
    </nav>
    <div class="container-fluid content-wrapper">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
