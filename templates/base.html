<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NFL Gravity - Data Pipeline{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
            color: #ff6b35 !important;
        }
        .nav-link {
            font-weight: 500;
        }
        .nav-link.active {
            background-color: #ff6b35 !important;
            border-radius: 5px;
        }
        .content-wrapper {
            min-height: calc(100vh - 76px);
            padding-top: 20px;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-running { background-color: #28a745; }
        .status-stopped { background-color: #dc3545; }
        .status-warning { background-color: #ffc107; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-football-ball me-2"></i>
                NFL Gravity
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                            <i class="fas fa-tachometer-alt me-1"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'scraping' %}active{% endif %}" href="/scraping">
                            <i class="fas fa-download me-1"></i>
                            Data Collection
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'view_data' %}active{% endif %}" href="/view-data">
                            <i class="fas fa-table me-1"></i>
                            View Data
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'players' %}active{% endif %}" href="/players">
                            <i class="fas fa-users me-1"></i>
                            All Players
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'test_scraper_page' %}active{% endif %}" href="/test-scraper">
                            <i class="fas fa-vial me-1"></i>
                            Test Scraper
                        </a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link">
                            <span class="status-indicator status-running" id="systemStatus"></span>
                            <span id="statusText">System Ready</span>
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Status Check Script -->
    <script>
        // Check system status
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const statusIndicator = document.getElementById('systemStatus');
                const statusText = document.getElementById('statusText');
                
                if (data.status === 'running') {
                    statusIndicator.className = 'status-indicator status-running';
                    statusText.textContent = 'System Ready';
                } else {
                    statusIndicator.className = 'status-indicator status-warning';
                    statusText.textContent = 'System Loading';
                }
            } catch (error) {
                const statusIndicator = document.getElementById('systemStatus');
                const statusText = document.getElementById('statusText');
                statusIndicator.className = 'status-indicator status-stopped';
                statusText.textContent = 'System Error';
            }
        }
        
        // Check status on page load
        document.addEventListener('DOMContentLoaded', checkSystemStatus);
        
        // Check status every 30 seconds
        setInterval(checkSystemStatus, 30000);
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
