name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gravity-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API deps
        run: pip install -r requirements-gravity-api.txt pytest
      - name: Pytest
        run: PYTHONPATH=. pytest gravity_api/tests -q

  gravity-terminal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gravity-terminal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gravity-terminal/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build
