# Nightly pipeline scheduling moved to Railway Cron — see gravity_api/railway.nightly.toml
#
# Create a separate Railway service (gravity-api-nightly) with config path railway.nightly.toml.
# Manual trigger only remains here for emergencies (hits the API, not the cron worker).

name: Nightly Sport Pipeline (manual only)

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Optional single sport (cfb, nfl, ...); blank = acceptance sports when gap_fill"
        required: false
        default: ""
      athlete_limit:
        description: "Max athletes per sport"
        required: false
        default: "100"
      gap_fill:
        description: "Gap-fill mode (missing IG/NIL/stats)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  trigger-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger nightly pipeline on Railway API
        env:
          GRAVITY_API_URL: ${{ secrets.GRAVITY_API_URL }}
          GRAVITY_INTERNAL_API_KEY: ${{ secrets.GRAVITY_INTERNAL_API_KEY }}
          SPORT: ${{ github.event.inputs.sport }}
          LIMIT: ${{ github.event.inputs.athlete_limit || '100' }}
          GAP_FILL: ${{ github.event.inputs.gap_fill || 'true' }}
        run: |
          set -euo pipefail
          API_URL="${GRAVITY_API_URL:-https://gravityscore-production.up.railway.app}"
          if [ -z "${GRAVITY_INTERNAL_API_KEY:-}" ]; then
            echo "::error::GRAVITY_INTERNAL_API_KEY secret required"
            exit 1
          fi

          sport_json="null"
          if [ -n "${SPORT:-}" ]; then
            sport_json="\"${SPORT}\""
          fi

          gap_json="true"
          if [ "${GAP_FILL:-true}" = "false" ]; then
            gap_json="false"
          fi

          payload=$(cat <<JSON
          {"sport": ${sport_json}, "athlete_limit": ${LIMIT}, "scrape": true, "rebuild_cohorts": true, "score": true, "gap_fill": ${gap_json}}
          JSON
          )

          echo "POST ${API_URL%/}/v1/pipeline/nightly"
          http_code=$(curl -sS -o /tmp/nightly_response.json -w "%{http_code}" \
            -X POST "${API_URL%/}/v1/pipeline/nightly" \
            -H "X-Gravity-Internal-Key: ${GRAVITY_INTERNAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          cat /tmp/nightly_response.json
          echo
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Nightly pipeline completed on Railway (HTTP $http_code)"
            exit 0
          fi
          echo "::error::Nightly API trigger failed with HTTP $http_code"
          exit 1
