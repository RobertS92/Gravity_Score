name: Nightly Sport Pipeline

on:
  schedule:
    # 3 AM UTC — triggers gravity_api on Railway (after railway-service daily at 2 AM UTC)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      sport:
        description: "Optional single sport (cfb, nfl, ...); blank = all 8"
        required: false
        default: ""
      athlete_limit:
        description: "Max stale athletes per sport"
        required: false
        default: "100"

jobs:
  trigger-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger nightly pipeline on Railway
        env:
          GRAVITY_API_URL: ${{ secrets.GRAVITY_API_URL }}
          GRAVITY_INTERNAL_API_KEY: ${{ secrets.GRAVITY_INTERNAL_API_KEY }}
          SPORT: ${{ github.event.inputs.sport }}
          LIMIT: ${{ github.event.inputs.athlete_limit || '100' }}
        run: |
          set -euo pipefail
          API_URL="${GRAVITY_API_URL:-https://gravityscore-production.up.railway.app}"
          if [ -z "${GRAVITY_INTERNAL_API_KEY:-}" ]; then
            echo "::error::GRAVITY_INTERNAL_API_KEY secret required (same value as gravity_api on Railway)"
            exit 1
          fi

          sport_json="null"
          if [ -n "${SPORT:-}" ]; then
            sport_json="\"${SPORT}\""
          fi

          payload=$(cat <<JSON
          {"sport": ${sport_json}, "athlete_limit": ${LIMIT}, "scrape": true, "rebuild_cohorts": true, "score": true}
          JSON
          )

          echo "POST ${API_URL%/}/v1/pipeline/nightly"
          http_code=$(curl -sS -o /tmp/nightly_response.json -w "%{http_code}" \
            -X POST "${API_URL%/}/v1/pipeline/nightly" \
            -H "X-Gravity-Internal-Key: ${GRAVITY_INTERNAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload")
          cat /tmp/nightly_response.json
          echo
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Nightly pipeline started on Railway (HTTP $http_code)"
            exit 0
          fi
          echo "::error::Nightly API trigger failed with HTTP $http_code"
          exit 1
