[build]
builder = "DOCKERFILE"
dockerfilePath = "railway-service/Dockerfile"

[deploy]
# Single worker: faster first healthy response for Railway healthchecks; avoids duplicate schedulers.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
