[build]
builder = "DOCKERFILE"
dockerfilePath = "railway-service/Dockerfile"

[deploy]
# Intentionally no startCommand: the Dockerfile CMD uses `sh -c` with `${PORT:-8000}`.
# Railway's start-command parser does not run a shell, so `$PORT` would not expand here.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
