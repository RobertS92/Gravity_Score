name: Weekly Full Scrape

on:
  schedule:
    - cron: '0 3 * * 0'  # 3 AM UTC Sunday
  workflow_dispatch:  # Allow manual trigger

jobs:
  trigger-weekly-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Weekly Job
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            ${{ secrets.RAILWAY_API_URL }}/api/v1/jobs/weekly \
            -H "Authorization: Bearer ${{ secrets.SCRAPER_API_KEY }}" \
            -H "Content-Type: application/json")
          
          if [ $response -eq 200 ]; then
            echo "✅ Weekly job triggered successfully"
          else
            echo "❌ Failed to trigger weekly job: HTTP $response"
            exit 1
          fi
      
      - name: Notify completion
        run: |
          echo "Weekly full scrape job has been triggered"
          echo "This job processes all active athletes and may take several hours"
          echo "Check status at: ${{ secrets.RAILWAY_API_URL }}/api/v1/jobs/status"
