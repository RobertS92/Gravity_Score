name: Daily VIP Scrape

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  trigger-daily-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Job
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            ${{ secrets.RAILWAY_API_URL }}/api/v1/jobs/daily \
            -H "Authorization: Bearer ${{ secrets.SCRAPER_API_KEY }}" \
            -H "Content-Type: application/json")
          
          if [ $response -eq 200 ]; then
            echo "✅ Daily job triggered successfully"
          else
            echo "❌ Failed to trigger daily job: HTTP $response"
            exit 1
          fi
      
      - name: Wait for job to start
        run: sleep 10
      
      - name: Check job status
        run: |
          echo "Checking job status..."
          curl -s ${{ secrets.RAILWAY_API_URL }}/api/v1/jobs/status | jq '.[0]'
