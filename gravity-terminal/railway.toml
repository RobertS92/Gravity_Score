# Service root in Railway must be `gravity-terminal/` (monorepo).
# Set VITE_API_URL on this service (runtime). The container entrypoint writes dist/env-config.js before serve.
# Example: https://${{Gravity_Score.RAILWAY_PUBLIC_DOMAIN}}/v1

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
